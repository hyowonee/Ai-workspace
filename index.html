<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>증시 현황 대시보드</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#f7f7f8; color:#111;}
    header { padding: 24px; background:#111; color:#fff;}
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px;}
    .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
    .card { background:#fff; border:1px solid #e6e6e6; border-radius:12px; padding:16px;}
    .muted { color:#666; font-size:14px;}
    h2 { margin: 0 0 8px 0;}
    .row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f0f0f0; }
    ul { padding-left: 18px; margin: 8px 0 0 0; }
    li { margin: 4px 0; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>증시 현황 대시보드 (기본)</h1>
      <div class="muted">미국 지수 · 선물 · 환율 · 주요 뉴스 (무료 소스)</div>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <section class="card">
        <h2>미국 지수 (Stooq)</h2>
        <div id="indices">로딩 중…</div>
      </section>
      <section class="card">
        <h2>선물 (Stooq)</h2>
        <div id="futures">로딩 중…</div>
      </section>
      <section class="card">
        <h2>환율 (Stooq)</h2>
        <div id="fx">로딩 중…</div>
      </section>
      <section class="card">
        <h2>주요 뉴스 (Google News RSS)</h2>
        <div id="news">로딩 중…</div>
      </section>
    </div>
  </div>

  <script>
    const parseCSV = (text) => {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      const last = lines[lines.length - 1].split(',');
      const obj = {};
      headers.forEach((h, i) => obj[h] = last[i]);
      return obj;
    };

    const via = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

    async function load() {
      const indicesEl = document.getElementById('indices');
      const futuresEl = document.getElementById('futures');
      const fxEl = document.getElementById('fx');
      const newsEl = document.getElementById('news');

      try {
        const [spx, ndq, dji] = await Promise.all([
          fetch(via('https://stooq.com/q/d/l/?s=^spx&i=d')).then(r=>r.text()),
          fetch(via('https://stooq.com/q/d/l/?s=^ndq&i=d')).then(r=>r.text()),
          fetch(via('https://stooq.com/q/d/l/?s=^dji&i=d')).then(r=>r.text())
        ]);
        const s = parseCSV(spx), n = parseCSV(ndq), d = parseCSV(dji);
        indicesEl.innerHTML = `
          <div class="row"><strong>S&P 500</strong><span>${s.Close} (${s.Date})</span></div>
          <div class="row"><strong>나스닥</strong><span>${n.Close} (${n.Date})</span></div>
          <div class="row"><strong>다우</strong><span>${d.Close} (${d.Date})</span></div>
        `;
      } catch (e) {
        indicesEl.textContent = '데이터 로딩 실패';
      }

      try {
        const [es, nq, ym] = await Promise.all([
          fetch(via('https://stooq.com/q/d/l/?s=es.f&i=d')).then(r=>r.text()),
          fetch(via('https://stooq.com/q/d/l/?s=nq.f&i=d')).then(r=>r.text()),
          fetch(via('https://stooq.com/q/d/l/?s=ym.f&i=d')).then(r=>r.text())
        ]);
        const e = parseCSV(es), n = parseCSV(nq), y = parseCSV(ym);
        futuresEl.innerHTML = `
          <div class="row"><strong>ES (S&P)</strong><span>${e.Close} (${e.Date})</span></div>
          <div class="row"><strong>NQ (나스닥)</strong><span>${n.Close} (${n.Date})</span></div>
          <div class="row"><strong>YM (다우)</strong><span>${y.Close} (${y.Date})</span></div>
        `;
      } catch (e) {
        futuresEl.textContent = '데이터 로딩 실패';
      }

      try {
        const usdk = await fetch(via('https://stooq.com/q/d/l/?s=usdk&i=d')).then(r=>r.text());
        const u = parseCSV(usdk);
        fxEl.innerHTML = `
          <div class="row"><strong>USD/KRW</strong><span>${u.Close} (${u.Date})</span></div>
        `;
      } catch (e) {
        fxEl.textContent = '데이터 로딩 실패';
      }

      try {
        const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=stock+market&hl=ko&gl=KR&ceid=KR:ko');
        const rss = await fetch(`https://api.allorigins.win/raw?url=${rssUrl}`).then(r=>r.text());
        const parser = new DOMParser();
        const xml = parser.parseFromString(rss, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item')).slice(0,5);
        newsEl.innerHTML = '<ul>' + items.map(i => {
          const title = i.querySelector('title')?.textContent || '제목 없음';
          const link = i.querySelector('link')?.textContent || '#';
          return `<li><a href="${link}" target="_blank" rel="noopener">${title}</a></li>`;
        }).join('') + '</ul>';
      } catch (e) {
        newsEl.textContent = '뉴스 로딩 실패';
      }
    }

    load();
  </script>
</body>
</html>
