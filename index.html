<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>증시 현황 대시보드</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background:#f7f7f8; color:#111;}
    header { padding: 24px; background:#111; color:#fff;}
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px;}
    .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
    .card { background:#fff; border:1px solid #e6e6e6; border-radius:12px; padding:16px;}
    .muted { color:#666; font-size:14px;}
    h2 { margin: 0 0 8px 0;}
    .row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #f0f0f0; }
    ul { padding-left: 18px; margin: 8px 0 0 0; }
    li { margin: 4px 0; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>증시 현황 대시보드 (기본)</h1>
      <div class="muted">미국 지수 · 선물 · 환율 · 주요 뉴스 (무료 소스)</div>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <section class="card">
        <h2>미국 지수</h2>
        <div id="indices">로딩 중…</div>
      </section>
      <section class="card">
        <h2>선물</h2>
        <div id="futures">로딩 중…</div>
      </section>
      <section class="card">
        <h2>환율 (USD/KRW)</h2>
        <div id="fx">로딩 중…</div>
      </section>
      <section class="card">
        <h2>주요 뉴스</h2>
        <div id="news">로딩 중…</div>
      </section>
    </div>
    <p class="muted" id="updated">업데이트: -</p>
  </div>

  <script>
    function row(label, value) {
      return `<div class="row"><strong>${label}</strong><span>${value}</span></div>`;
    }

    async function load() {
      const indicesEl = document.getElementById('indices');
      const futuresEl = document.getElementById('futures');
      const fxEl = document.getElementById('fx');
      const newsEl = document.getElementById('news');
      const updatedEl = document.getElementById('updated');

      try {
        const market = await fetch(`./data/market.json?v=${Date.now()}`, { cache: 'no-store' }).then(r=>r.json());
        const i = market.indices;
        const f = market.futures;
        indicesEl.innerHTML = [
          row('S&P 500', `${i.spx.Close} (${i.spx.Date})`),
          row('나스닥', `${i.ndq.Close} (${i.ndq.Date})`),
          row('다우', `${i.dji.Close} (${i.dji.Date})`)
        ].join('');
        futuresEl.innerHTML = [
          row('ES (S&P)', `${f.es.Close} (${f.es.Date})`),
          row('NQ (나스닥)', `${f.nq.Close} (${f.nq.Date})`),
          row('YM (다우)', `${f.ym.Close} (${f.ym.Date})`)
        ].join('');
        if (market.fx.usdkrw && market.fx.usdkrw.rate) {
          fxEl.innerHTML = row('USD/KRW', `${market.fx.usdkrw.rate.toFixed(2)} (${market.fx.usdkrw.time_last_update_utc})`);
        } else {
          fxEl.textContent = '데이터 로딩 실패';
        }
        updatedEl.textContent = `업데이트: ${market.updated_at_utc}`;
      } catch (e) {
        indicesEl.textContent = '데이터 로딩 실패';
        futuresEl.textContent = '데이터 로딩 실패';
        fxEl.textContent = '데이터 로딩 실패';
      }

      try {
        const news = await fetch(`./data/news.json?v=${Date.now()}`, { cache: 'no-store' }).then(r=>r.json());
        newsEl.innerHTML = '<ul>' + news.items.map(i => `<li><a href="${i.link}" target="_blank" rel="noopener">${i.title}</a></li>`).join('') + '</ul>';
      } catch (e) {
        newsEl.textContent = '뉴스 로딩 실패';
      }
    }

    load();
  </script>
</body>
</html>
